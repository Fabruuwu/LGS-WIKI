<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensajes · LGS Wiki</title>
<link rel="stylesheet" href="styles.css">
<style>
.messages-wrap {
  max-width: 800px; margin: 100px auto 40px; padding: 0 20px;
}
.new-msg-box {
  background: rgba(20,20,40,0.8); border: 1px solid rgba(155,89,245,0.3);
  border-radius: 14px; padding: 16px; margin-bottom: 32px;
}
.new-msg-box input, .new-msg-box textarea {
  width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(155,89,245,0.3);
  border-radius: 10px; padding: 10px 14px; color: #fff; font-family:'Rajdhani',sans-serif;
  font-size:.92rem; margin-bottom:10px; outline:none; display:block;
}
.new-msg-box input::placeholder, .new-msg-box textarea::placeholder { color:rgba(255,255,255,.35); }
.new-msg-box input:focus, .new-msg-box textarea:focus { border-color: var(--violet); }
.btn-send {
  background: linear-gradient(90deg, var(--violet), #9b59f5); border: none;
  color: #fff; padding: 10px 20px; border-radius: 20px; font-weight: bold;
  cursor: pointer; font-family: 'Rajdhani', sans-serif; font-size: 1rem;
  transition: opacity .2s;
}
.btn-send:hover { opacity: .85; }
.msg-list { display: flex; flex-direction: column; gap: 14px; }
.msg-card {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; padding: 14px; cursor: pointer; transition: .2s;
}
.msg-card:hover { border-color: var(--violet); }
.msg-author { font-weight: 700; color: var(--cyan); margin-bottom: 4px; }
.msg-text { color: #ddd; font-size: .9rem; margin-bottom: 8px; }
.msg-time { font-size: .7rem; color: rgba(255,255,255,0.4); text-align: right; }
.msg-replies { font-size: .8rem; color: var(--violet); margin-top: 8px; }

/* Modal */
.modal-messages {
  position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.8);
  backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: .2s;
}
.modal-messages.open { opacity: 1; pointer-events: all; }
.modal-content {
  background: #0f0f24; border: 1px solid rgba(155,89,245,0.4); border-radius: 16px;
  width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto;
  padding: 20px; position: relative;
}
.modal-close-btn {
  position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,.5);
  border: 1px solid rgba(255,255,255,.2); color: #fff; font-size: 1.1rem;
  width:30px; height:30px; border-radius:50%; cursor: pointer;
  display:flex; align-items:center; justify-content:center;
}
.modal-close-btn:hover { background: rgba(255,79,163,.5); }
.reply-item { border-bottom: 1px solid rgba(255,255,255,.06); padding: 10px 0; }
.reply-author { font-weight: 700; color: var(--gold); }
.reply-text { color: #ddd; font-size: .85rem; margin: 4px 0; }
.reply-time { font-size: .7rem; color: rgba(255,255,255,.4); text-align: right; }
.reply-form { margin-top: 16px; }
.reply-form input, .reply-form textarea {
  width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(155,89,245,0.3);
  border-radius: 10px; padding: 8px 12px; color: #fff; font-family:'Rajdhani',sans-serif;
  font-size:.85rem; margin-bottom:6px; outline:none; display:block;
}
.reply-form input::placeholder, .reply-form textarea::placeholder { color:rgba(255,255,255,.35); }
.msg-loading { color:rgba(255,255,255,.3); text-align:center; padding:40px 0; font-style:italic; }
</style>
</head>
<body data-page="mensajes">
<div class="bg-layer"></div>
<nav>
  <div class="nav-logo" onclick="goTo('home')">LGS</div>
  <button class="nav-hamburger" id="nav-hamburger" aria-label="Menú">
    <span></span><span></span><span></span>
  </button>
  <div class="nav-links" id="nav-links">
    <button class="nav-btn" data-page="home"       onclick="goTo('home');closeMenu()">Inicio</button>
    <button class="nav-btn" data-page="personajes" onclick="goTo('personajes');closeMenu()">Personajes</button>
    <button class="nav-btn" data-page="inventario" onclick="goTo('inventario');closeMenu()">Inventario</button>
    <button class="nav-btn" data-page="tierlist"   onclick="goTo('tierlist');closeMenu()">Tier List</button>
    <button class="nav-btn" data-page="equipos"    onclick="goTo('equipos');closeMenu()">Equipos</button>
    <button class="nav-btn" data-page="notas"      onclick="goTo('notas');closeMenu()">Notas</button>
  </div>
</nav>

<div class="messages-wrap">
  <div class="section-header" style="text-align:center;margin-bottom:32px;">
    <div class="section-badge">✦ Comunidad ✦</div>
    <h1 class="section-title">💬 Mensajes del Server</h1>
    <p class="section-sub">Dejá tu mensaje · Respondé a otros</p>
  </div>

  <div class="new-msg-box">
    <input type="text" id="msg-author" placeholder="Tu nombre" maxlength="30">
    <textarea id="msg-text" rows="3" placeholder="Escribí tu mensaje..."></textarea>
    <button class="btn-send" id="btn-send">Enviar Mensaje</button>
  </div>

  <div id="msg-list" class="msg-list">
    <div class="msg-loading">Cargando mensajes...</div>
  </div>
</div>

<!-- Modal respuestas -->
<div class="modal-messages" id="reply-modal">
  <div class="modal-content">
    <button class="modal-close-btn" id="modal-close-btn">✕</button>
    <div id="modal-msg-content"></div>
    <div id="modal-replies"></div>
    <div class="reply-form">
      <input type="text" id="reply-author" placeholder="Tu nombre">
      <textarea id="reply-text" rows="2" placeholder="Escribí tu respuesta..."></textarea>
      <button class="btn-send" id="btn-reply">Responder</button>
    </div>
  </div>
</div>

<!-- scripts.js primero (sin type=module, solo defer) -->
<script src="scripts.js" defer></script>

<!-- Firebase como módulo -->
<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy,
         onSnapshot, serverTimestamp, getDoc, updateDoc, doc }
  from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAg6nLimbuLd5uE9GQX9pc0n3jOS-TouQo",
  authDomain: "lgs-mensajes-wiki.firebaseapp.com",
  projectId: "lgs-mensajes-wiki",
  storageBucket: "lgs-mensajes-wiki.firebasestorage.app",
  messagingSenderId: "162237301913",
  appId: "1:162237301913:web:bc6080ccae40134e7be408"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const mensajesRef = collection(db, "mensajes");

let mensajeActualId = null;

// ── Cerrar modal ──
function cerrarModal() {
  document.getElementById('reply-modal').classList.remove('open');
  mensajeActualId = null;
}
// Exponer globalmente por si hace falta
window.cerrarModal = cerrarModal;

// ── Abrir modal ──
function abrirModal(id, data) {
  mensajeActualId = id;
  document.getElementById('modal-msg-content').innerHTML = `
    <div class="msg-author" style="color:var(--cyan)">${data.autor}</div>
    <div class="msg-text">${data.texto}</div>
    <hr style="border-color:rgba(255,255,255,0.1);margin:10px 0;">
  `;
  const repliesDiv = document.getElementById('modal-replies');
  repliesDiv.innerHTML = '';
  (data.respuestas || []).forEach(r => {
    const d = document.createElement('div');
    d.className = 'reply-item';
    d.innerHTML = `
      <div class="reply-author">${r.autor}</div>
      <div class="reply-text">${r.texto}</div>
      <div class="reply-time">${r.fecha}</div>`;
    repliesDiv.appendChild(d);
  });
  document.getElementById('reply-modal').classList.add('open');
}

// ── Enviar mensaje principal ──
document.getElementById('btn-send').addEventListener('click', async () => {
  const autor = document.getElementById('msg-author').value.trim();
  const texto = document.getElementById('msg-text').value.trim();
  if (!autor || !texto) return alert('Completá ambos campos');
  await addDoc(mensajesRef, { autor, texto, timestamp: serverTimestamp(), respuestas: [] });
  document.getElementById('msg-author').value = '';
  document.getElementById('msg-text').value = '';
});

// ── Mensajes en tiempo real ──
const q = query(mensajesRef, orderBy('timestamp', 'desc'));
onSnapshot(q, snap => {
  const lista = document.getElementById('msg-list');
  lista.innerHTML = '';
  if (snap.empty) {
    lista.innerHTML = '<div class="msg-loading">Aún no hay mensajes. ¡Sé el primero!</div>';
    return;
  }
  snap.forEach(docSnap => {
    const data = docSnap.data();
    const fecha = data.timestamp?.toDate().toLocaleString('es-AR') || 'Recién';
    const nResp = (data.respuestas || []).length;
    const div = document.createElement('div');
    div.className = 'msg-card';
    div.innerHTML = `
      <div class="msg-author">${data.autor}</div>
      <div class="msg-text">${data.texto}</div>
      <div class="msg-time">${fecha}</div>
      <div class="msg-replies">💬 ${nResp} respuesta${nResp !== 1 ? 's' : ''}</div>`;
    div.addEventListener('click', () => abrirModal(docSnap.id, data));
    lista.appendChild(div);
  });
});

// ── Enviar respuesta ──
document.getElementById('btn-reply').addEventListener('click', async () => {
  const autor = document.getElementById('reply-author').value.trim();
  const texto = document.getElementById('reply-text').value.trim();
  if (!autor || !texto || !mensajeActualId) return alert('Completá los campos');
  const docRef  = doc(db, "mensajes", mensajeActualId);
  const docSnap = await getDoc(docRef);
  if (!docSnap.exists()) return;
  const respuestas = [...(docSnap.data().respuestas || []),
    { autor, texto, fecha: new Date().toLocaleString('es-AR') }];
  await updateDoc(docRef, { respuestas });
  document.getElementById('reply-author').value = '';
  document.getElementById('reply-text').value = '';
  const updated = await getDoc(docRef);
  abrirModal(mensajeActualId, updated.data());
});

// ── Cerrar modal ──
document.getElementById('modal-close-btn').addEventListener('click', cerrarModal);
document.getElementById('reply-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) cerrarModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarModal(); });
</script>
</body>
</html>
