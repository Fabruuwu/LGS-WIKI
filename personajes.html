<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personajes · LGS Wiki</title>
<link rel="stylesheet" href="styles.css">
</head>
<body data-page="personajes">
<div class="bg-layer"></div>
<nav>
  <div class="nav-logo" onclick="goTo('home')">LGS</div>
  <button class="nav-hamburger" id="nav-hamburger" aria-label="Menú">
    <span></span><span></span><span></span>
  </button>
  <div class="nav-links" id="nav-links">
    <button class="nav-btn" data-page="home"       onclick="goTo('home');closeMenu()">Inicio</button>
    <button class="nav-btn" data-page="personajes" onclick="goTo('personajes');closeMenu()">Personajes</button>
    <button class="nav-btn" data-page="inventario" onclick="goTo('inventario');closeMenu()">Inventario</button>
    <button class="nav-btn" data-page="tierlist"   onclick="goTo('tierlist');closeMenu()">Tier List</button>
    <button class="nav-btn" data-page="equipos"    onclick="goTo('equipos');closeMenu()">Equipos</button>
    <button class="nav-btn" data-page="notas"      onclick="goTo('notas');closeMenu()">Notas</button>
  </div>
</nav>

<div class="chars-wrap">
  <div class="section-header">
    <div class="section-badge">✦ Enciclopedia de Héroes ✦</div>
    <h2 class="section-title">Personajes</h2>
    <p class="section-sub">Explorá a los guerreros de la LGS, conocé sus habilidades únicas y dominá el campo de batalla.</p>
    <div class="hero-divider" style="margin: 20px auto;"></div>
  </div>

<div class="filters">
  <div class="search-wrap">
    <span class="s-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Buscar (ej: elemento:fuego, rareza:5, nombre)">
  </div>
  <div class="count-lbl"><span id="char-count">0</span> personajes</div>
</div>

    <!-- Filtro de Rareza -->
    <div class="fg">
      <div class="fl">Rareza</div>
      <div class="fp" id="rarity-filters">
        <button class="pill active" data-rarity="all">Todas</button>
        <button class="pill" data-rarity="5">5★</button>
        <button class="pill" data-rarity="4">4★</button>
      </div>
    </div>

    <div class="fdiv"></div>

    <!-- Filtro de Elemento -->
    <div class="fg">
      <div class="fl">Elemento</div>
      <div class="fp" id="elem-filters">
        <button class="pill active" data-elem="all">Todos</button>
        <button class="pill" data-elem="fuego"><span class="edot" style="background:var(--fuego)"></span>Fuego</button>
        <button class="pill" data-elem="hidro"><span class="edot" style="background:var(--hidro)"></span>Agua</button>
        <button class="pill" data-elem="aero"><span class="edot" style="background:var(--aero)"></span>Viento</button>
        <button class="pill" data-elem="electro"><span class="edot" style="background:var(--electro)"></span>Rayo</button>
        <button class="pill" data-elem="crio"><span class="edot" style="background:var(--crio)"></span>Hielo</button>
        <button class="pill" data-elem="geo"><span class="edot" style="background:var(--geo)"></span>Tierra</button>
        <button class="pill" data-elem="flora"><span class="edot" style="background:var(--flora)"></span>Naturaleza</button>
        <button class="pill" data-elem="celestial"><span class="edot" style="background:var(--celestial)"></span>Luz</button>
        <button class="pill" data-elem="umbral"><span class="edot" style="background:var(--umbral)"></span>Oscuridad</button>
        <button class="pill" data-elem="caos"><span class="edot" style="background:var(--caos)"></span>Vacío</button>
      </div>
    </div>

    <div class="count-lbl"><span id="char-count">0</span> personajes</div>
  </div>

  <div class="chars-grid" id="chars-grid"></div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>
<script src="scripts.js" defer></script>
</body>
</html>
