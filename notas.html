<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LGS Wiki – Notas de Parche</title>
<link rel="stylesheet" href="styles.css">
<style>
/* ── Versiones selector ── */
.patch-wrap{position:relative;z-index:1;padding:100px 40px 60px;max-width:1100px;margin:0 auto;}

.version-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:36px;justify-content:center;}
.vtab{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:20px;
  padding:6px 18px;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .22s;
  color:rgba(255,255,255,.55);letter-spacing:1px;font-family:'Rajdhani',sans-serif;}
.vtab:hover{border-color:rgba(155,89,245,.5);color:#fff;}
.vtab.active{background:rgba(155,89,245,.22);border-color:var(--violet);color:#fff;}

/* ════════════════════════════════════════
   ESTILOS DEL MODAL
════════════════════════════════════════ */
.tl-modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,.85); backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .25s;
}
.tl-modal-overlay.open { opacity: 1; pointer-events: all; }

.tl-modal-card {
  width: 480px; max-width: 94vw;
  background: #0f0f24;
  border: 1px solid rgba(155,89,245,.4);
  border-radius: 16px; overflow: hidden;
  position: relative;
  transform: translateY(20px);
  transition: transform .25s;
}
.tl-modal-overlay.open .tl-modal-card { transform: translateY(0); }

.tl-modal-close {
  position: absolute; top: 10px; right: 10px; z-index: 10;
  background: rgba(0,0,0,.6); border: 1px solid rgba(255,255,255,.2);
  color: #fff; width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1rem; transition: background .2s;
}
.tl-modal-close:hover { background: rgba(255,79,163,.6); }

.tl-modal-header {
  padding: 12px 16px;
  background: rgba(0,0,0,.3);
  font-family: 'Cinzel Decorative', cursive;
  font-size: 1rem; color: #fff;
  text-align: center; letter-spacing: 1px;
  border-bottom: 1px solid rgba(255,255,255,.05);
}
</style>
</head>
<body data-page="notas">
<div class="bg-layer"></div>

<nav>
  <div class="nav-logo" onclick="goTo('home')">LGS</div>
  <button class="nav-hamburger" id="nav-hamburger" aria-label="Menú">
    <span></span><span></span><span></span>
  </button>
  <div class="nav-links" id="nav-links">
    <button class="nav-btn" data-page="home"       onclick="goTo('home');closeMenu()">Inicio</button>
    <button class="nav-btn" data-page="personajes" onclick="goTo('personajes');closeMenu()">Personajes</button>
    <button class="nav-btn" data-page="inventario" onclick="goTo('inventario');closeMenu()">Inventario</button>
    <button class="nav-btn" data-page="tierlist"   onclick="goTo('tierlist');closeMenu()">Tier List</button>
    <button class="nav-btn" data-page="equipos"    onclick="goTo('equipos');closeMenu()">Equipos</button>
    <button class="nav-btn" data-page="notas"      onclick="goTo('notas');closeMenu()">Notas</button>
  </div>
</nav>

<div class="patch-wrap">
  <!-- HEADER -->
  <div class="section-header">
    <div class="section-badge">✦ Historial ✦</div>
    <h1 class="section-title">Notas de Parche</h1>
    <p class="section-sub">Buffs · Nerfs · Reworks · Fixes</p>
  </div>

  <!-- BOTONES DE VERSIÓN -->
  <div class="version-tabs">
    <button class="vtab" id="btn-v1">Notas Parche V1 - 1.0</button>
    <button class="vtab" id="btn-v2">Notas Parche V2 - 1.0</button>
    <button class="vtab" id="btn-v3">Notas Parche V3 - 1.0</button>
  </div>
</div>

<!-- Modales -->
<div class="tl-modal-overlay" id="v1-modal-overlay">
  <div class="tl-modal-card">
    <button class="tl-modal-close" id="v1-modal-close">✕</button>
    <div class="tl-modal-header">Notas Parche V1 - Version 1.0</div>
    <div style="padding:20px; text-align:center; color:rgba(255,255,255,0.5);">
      Próximamente...
    </div>
  </div>
</div>

<div class="tl-modal-overlay" id="v2-modal-overlay">
  <div class="tl-modal-card">
    <button class="tl-modal-close" id="v2-modal-close">✕</button>
    <div class="tl-modal-header">Notas Parche V2 - Version 1.0</div>
    <div style="padding:20px; text-align:center; color:rgba(255,255,255,0.5);">
      Próximamente...
    </div>
  </div>
</div>

<div class="tl-modal-overlay" id="v3-modal-overlay">
  <div class="tl-modal-card">
    <button class="tl-modal-close" id="v3-modal-close">✕</button>
    <div class="tl-modal-header">Notas Parche V3 - Version 1.0</div>
    <div style="padding:20px; text-align:center; color:rgba(255,255,255,0.5);">
      Próximamente...
    </div>
  </div>
</div>

<script src="scripts.js" defer></script>
<script>
// ── Configuración de los tres modales ──
document.addEventListener('DOMContentLoaded', () => {
  function setupModal(btnId, overlayId, closeBtnId) {
    const btn = document.getElementById(btnId);
    const overlay = document.getElementById(overlayId);
    const closeBtn = document.getElementById(closeBtnId);

    function open() {
      overlay.classList.add('open');
    }
    function close() {
      overlay.classList.remove('open');
    }

    btn.addEventListener('click', open);
    closeBtn.addEventListener('click', close);
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) close();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && overlay.classList.contains('open')) close();
    });
  }

  setupModal('btn-v1', 'v1-modal-overlay', 'v1-modal-close');
  setupModal('btn-v2', 'v2-modal-overlay', 'v2-modal-close');
  setupModal('btn-v3', 'v3-modal-overlay', 'v3-modal-close');
});
</script>
<div id="global-tooltip"></div>
</body>
</html>
